schedule:
  time: "07:30"

tts:
  engine: voicevox
  voicevox:
    host: "http://localhost:50021"
    speaker_id: 3
    speed_scale: 1.1
    volume_scale: 1.0
    engine_dir: "voicevox_engine"  # ENGINE の exe を置くディレクトリ（なければ自動ダウンロード）
    download_url: "https://github.com/VOICEVOX/voicevox_engine/releases/download/0.25.1/voicevox_engine-windows-cpu-0.25.1.7z.001"

plugins:
  # timetree は別ツールとして開発中。後で統合予定。
  # - name: timetree
  #   enabled: false
  #   order: 1

  - name: news
    enabled: true
    order: 2
    max_items: 15
    sources:
      - type: rss
        url: "https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja"
        label: "Google ニュース"
      - type: rss
        url: "https://www3.nhk.or.jp/rss/news/cat0.xml"
        label: "NHK トップ"
